# 로컬 개발 스택 — Postgres + Redis
# 기동:  docker compose -f docker-compose.dev.yml up -d
# 정리:  docker compose -f docker-compose.dev.yml down
services:
  postgres:
    image: postgres:16
    container_name: dentalsync-postgres
    restart: unless-stopped   # 재부팅/Docker 재시작 후 자동 기동 (미설정 시 로컬 /api/orders 500의 원인)
    environment:
      POSTGRES_USER: dentalsync
      POSTGRES_PASSWORD: dentalsync
      POSTGRES_DB: dentalsync
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dentalsync"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: dentalsync-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
